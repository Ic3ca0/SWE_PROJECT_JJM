<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Graph App</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: white;
    }

    button {
      cursor: pointer;
      background: #2d6cdf;
      border: none;
    }

    button:hover {
      opacity: 0.92;
    }

    .delete-btn {
      background: #b33939;
      width: auto;
      padding: 8px 12px;
      margin: 0;
    }

    .logout-btn {
      background: #555;
      width: auto;
      padding: 8px 16px;
      margin: 0;
      font-size: 13px;
    }

    .entry-card, .food-card {
      background: #202020;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    #graph-container {
      background: #151515;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      height: calc(100vh - 40px);
      box-sizing: border-box;
    }

    #graph {
      width: 100%;
      height: calc(100% - 60px);
    }

    .small {
      color: #bbb;
      font-size: 14px;
    }

    .message {
      font-size: 14px;
      color: #a5d6a7;
      min-height: 20px;
    }

    .user-info {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <div class="panel">
        <div class="row">
          <h1>Food Graph</h1>
          <div class="row" style="gap: 8px;">
            <span id="username-display" class="user-info"></span>
            <button id="logout-btn" class="logout-btn">Logout</button>
          </div>
        </div>
        <label for="date-input">Date</label>
        <input id="date-input" type="date" />
      </div>

      <div class="panel">
        <h2>Create Food</h2>
        <input id="food-name" type="text" placeholder="Food name" />
        <input id="food-calories" type="number" step="0.01" placeholder="Calories per serving" />
        <input id="food-serving-grams" type="number" step="0.01" placeholder="Serving grams" />
        <select id="food-type">
          <option value="fruit">Fruit</option>
          <option value="vegetable">Vegetable</option>
          <option value="protein">Protein</option>
          <option value="grains">Grains</option>
          <option value="dairy">Dairy</option>
          <option value="fats">Fats</option>
          <option value="beverages">Beverages</option>
          <option value="sweets">Sweets</option>
          <option value="other">Other</option>
        </select>
        <button id="create-food-btn">Save Food</button>
        <div id="create-food-message" class="message"></div>
      </div>

      <div class="panel">
        <h2>Log Food</h2>
        <select id="food-select"></select>
        <input id="entry-grams" type="number" step="0.01" placeholder="Grams eaten" />
        <button id="add-entry-btn">Add Entry</button>
        <div id="add-entry-message" class="message"></div>
      </div>

      <div class="panel">
        <h2>Saved Foods</h2>
        <div id="foods-list"></div>
      </div>

      <div class="panel">
        <div class="row">
          <h2>Daily Log</h2>
          <strong id="daily-total">0.00 cal</strong>
        </div>
        <div id="entries-list"></div>
      </div>
    </div>

    <div id="graph-container">
      <div class="row">
        <h2>Food Group Graph</h2>
        <strong id="graph-total">0.00 cal</strong>
      </div>
      <svg id="graph"></svg>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
