<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Graph App</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg:         #0f0505;
      --bg2:        #220d0d;
      --bg3:        #2a1010;
      --red:        #7a1515;
      --red-bright: #a01e1e;
      --red-dim:    #4a0d0d;
      --cream:      #f0e6d0;
      --cream-dim:  #c4b49a;
      --cream-faint:#7a6a55;
      --border:     #4a1a1a;
      --border2:    #3a1212;
      --accent-cal:     #a01e1e;
      --accent-protein: #e8a020;
      --accent-green:   #4caf78;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* top header*/
    #header {
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
      padding: 12px 20px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex-shrink: 0;
    }

    #header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    #app-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.5px;
    }

    #app-title span {
      color: var(--red-bright);
    }

    #user-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #username-display {
      color: var(--cream-dim);
      font-size: 13px;
    }

    #logout-btn {
      background: var(--red-dim);
      color: var(--cream-dim);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    #logout-btn:hover { background: var(--red); color: var(--cream); }

    /* ── Date Tabs ── */
    #date-tabs-wrapper {
      position: relative;
      overflow: hidden;
    }

    #date-tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 0;
      scrollbar-width: none;
    }
    #date-tabs::-webkit-scrollbar { display: none; }

    /* wrapper provides the cream border via background color showing 1px around inner tab */
    .date-tab-wrapper {
      flex-shrink: 0;
      position: relative;
      top: 1px;
      margin-right: -10px;
      z-index: 1;
      clip-path: polygon(0 7px, 7px 0, calc(100% - 14px) 0, 100% 100%, 0 100%);
      background: rgba(240, 230, 208, 0.451);
      transition: background 0.15s;
    }

    .date-tab-wrapper:hover {
      background: rgba(240, 230, 208, 0.587);
      z-index: 2;
    }
    .date-tab-wrapper.active {
      background: rgba(240, 230, 208, 0.768);
      z-index: 3;
    }

    .date-tab {
      display: block;
      margin: 2px 2px 0 2px;
      padding: 8px 22px 10px 18px;
      background: var(--bg3);
      color: var(--cream-faint);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, color 0.15s;
      /* same shape as wrapper so the border follows the diagonal edge */
      clip-path: polygon(0 7px, 7px 0, calc(100% - 14px) 0, 100% 100%, 0 100%);
    }

    .date-tab-wrapper:hover .date-tab {
      background: var(--red-dim);
      color: var(--cream-dim);
    }

    .date-tab-wrapper.active .date-tab {
      background: var(--bg);
      color: var(--cream);
      font-weight: 600;
    }

    .date-tab .tab-day {
      font-size: 11px;
      color: inherit;
      opacity: 0.7;
      display: block;
      text-align: center;
    }

    .date-tab .tab-date {
      display: block;
      text-align: center;
    }

    #scroll-left, #scroll-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 32px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(to right, var(--bg2), transparent);
      border: none;
      color: var(--cream-dim);
      cursor: pointer;
      font-size: 16px;
      z-index: 2;
      padding: 0;
    }
    #scroll-left { left: 0; background: linear-gradient(to right, var(--bg2) 60%, transparent); }
    #scroll-right { right: 0; background: linear-gradient(to left, var(--bg2) 60%, transparent); }
    #scroll-left:hover, #scroll-right:hover { color: var(--cream); }

    /* ── Main layout ── */
    #main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      padding: 16px;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--red-dim) transparent;
    }

    /* ── Panels ── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--cream-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ── Inputs ── */
    input, select {
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--cream);
      font-size: 13px;
    }
    input::placeholder { color: var(--cream-faint); }
    input:focus, select:focus {
      outline: none;
      border-color: var(--red-bright);
    }
    select option { background: var(--bg3); }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--red);
      color: var(--cream);
    }
    .btn-primary:hover { background: var(--red-bright); }

    .btn-danger, .delete-btn {
      background: transparent;
      border: 1px solid #4a1a1a;
      color: var(--cream-faint);
      width: auto;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }
    .btn-danger:hover, .delete-btn:hover {
      background: var(--red);
      border-color: var(--red-bright);
      color: var(--cream);
    }

    #entries-list {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--red-dim) transparent;
    }

    /* ── Cards ── */
    .entry-card, .food-card {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--cream);
    }

    .card-meta {
      font-size: 11px;
      color: var(--cream-faint);
      margin-top: 2px;
    }

    /* ── Daily total ── */
    .panel-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .panel-header-row h2 { margin: 0; }

    #daily-total {
      font-size: 13px;
      color: var(--red-bright);
      font-weight: 700;
    }

    /* ── Message ── */
    .message {
      font-size: 12px;
      color: #b0c8a0;
      min-height: 16px;
      margin-top: 2px;
    }

    /* ── Graph panel ── */
    #graph-container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #graph-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    #graph-header h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--cream-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    #graph-total {
      font-size: 13px;
      color: var(--red-bright);
      font-weight: 700;
    }

    #graph {
      flex: 1;
      width: 100%;
    }

    .small { color: var(--cream-faint); font-size: 12px; }

    .entry-hidden { display: none; }

    .btn-toggle-log {
      display: block;
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      background: transparent;
      border: 1px solid var(--red-dim);
      border-radius: 6px;
      color: var(--cream-dim);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn-toggle-log:hover { background: var(--red-dim); color: var(--cream); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>

  <!-- Top Header + Date Tabs -->
  <div id="header">
    <div id="header-top">
      <div id="app-title">Food<span>Graph</span></div>
      <div id="user-row">
        <span id="username-display"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </div>

    <div id="date-tabs-wrapper">
      <button id="scroll-left">&#8249;</button>
      <div id="date-tabs"></div>
      <button id="scroll-right">&#8250;</button>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main">
    <div id="sidebar">

      <div class="panel">
        <div class="panel-header-row">
          <h2>Daily Log</h2>
          <strong id="daily-total">0.00 cal</strong>
        </div>
        <div id="entries-list"></div>
      </div>

      <div class="panel">
        <h2>Log Food</h2>
        <select id="food-select"></select>
        <input id="entry-grams" type="number" step="0.01" placeholder="Grams eaten" />
        <button id="add-entry-btn" class="btn btn-primary">Add Entry</button>
        <div id="add-entry-message" class="message"></div>
      </div>

      <div class="panel">
        <h2>Create Food</h2>
        <input id="food-name" type="text" placeholder="Food name" />
        <input id="food-calories" type="number" step="0.01" placeholder="Calories per serving" />
        <input id="food-serving-grams" type="number" step="0.01" placeholder="Serving grams" />
        <select id="food-type">
          <option value="fruit">Fruit</option>
          <option value="vegetable">Vegetable</option>
          <option value="protein">Protein</option>
          <option value="grains">Grains</option>
          <option value="dairy">Dairy</option>
          <option value="fats">Fats</option>
          <option value="beverages">Beverages</option>
          <option value="sweets">Sweets</option>
          <option value="other">Other</option>
        </select>
        <button id="create-food-btn" class="btn btn-primary">Save Food</button>
        <div id="create-food-message" class="message"></div>
      </div>

    </div>

    <div id="graph-container">
      <div id="graph-header">
        <h2>Food Group Graph</h2>
        <strong id="graph-total">0.00 cal</strong>
      </div>
      <svg id="graph"></svg>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>

<!-- AI Chat UI -->
<div id="ai-chat-ui">
  <button id="open-chat-btn" title="Open assistant" style="position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:28px;background:#a01e1e;color:#fff;border:none;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.4);font-weight:700;">AI</button>

  <div id="ai-chat-modal" style="display:none;position:fixed;right:20px;bottom:88px;width:360px;height:480px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.6);z-index:9999;">
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-weight:700;color:var(--cream);">Assistant</div>
      <button id="close-chat-btn" style="background:transparent;border:none;color:var(--cream-faint);cursor:pointer;padding:6px 8px;">✕</button>
    </div>
    <div id="ai-chat-messages" style="padding:12px;overflow:auto;height:360px;color:var(--cream);font-size:13px;">Loading...</div>
    <form id="ai-chat-form" style="display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);">
      <input id="ai-chat-input" type="text" placeholder="Ask about your diet or logs..." style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--cream);" />
      <button type="submit" class="btn btn-primary" style="padding:8px 10px;width:86px;">Send</button>
    </form>
  </div>
</div>
