<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Graph - Login</title>
  <style>
    :root {
      --bg:         #0f0505;
      --bg2:        #1a0a0a;
      --bg3:        #240e0e;
      --red:        #7a1515;
      --red-bright: #a01e1e;
      --red-dim:    #4a0d0d;
      --cream:      #f0e6d0;
      --cream-dim:  #c4b49a;
      --cream-faint:#7a6a55;
      --border:     #3a1515;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      width: 360px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 22px;
      color: var(--cream);
    }

    .subtitle {
      font-size: 12px;
      color: var(--cream-faint);
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--cream);
      font-size: 14px;
    }
    input::placeholder { color: var(--cream-faint); }
    input:focus { outline: none; border-color: var(--red-bright); }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: var(--red);
      color: var(--cream);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--red-bright); }

    .toggle {
      text-align: center;
      margin-top: 18px;
      color: var(--cream-faint);
      font-size: 13px;
    }

    .toggle a {
      color: var(--cream-dim);
      cursor: pointer;
      text-decoration: underline;
    }
    .toggle a:hover { color: var(--cream); }

    .message {
      font-size: 13px;
      color: #c07070;
      min-height: 18px;
      margin-top: 6px;
    }

    .success { color: #90b880; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1 id="form-title">Login</h1>
    <div class="subtitle">Track your daily nutrition</div>
    <input id="username" type="text" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="submit-btn">Login</button>
    <div id="message" class="message"></div>
    <div class="toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link">Sign up</a>
    </div>
  </div>

  <script>
    // login and register form handler
    let isLogin = true;
    const title = document.getElementById("form-title");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submit-btn");
    const message = document.getElementById("message");
    const toggleText = document.getElementById("toggle-text");
    const toggleLink = document.getElementById("toggle-link");

    toggleLink.addEventListener("click", () => {
      isLogin = !isLogin;
      title.textContent = isLogin ? "Login" : "Sign Up";
      submitBtn.textContent = isLogin ? "Login" : "Create Account";
      toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      toggleLink.textContent = isLogin ? "Sign up" : "Log in";
      message.textContent = "";
    });

    submitBtn.addEventListener("click", async () => {
      message.textContent = "";
      message.className = "message";

      const user = usernameInput.value.trim();
      const pass = passwordInput.value;

      if (!user || !pass) {
        message.textContent = "Enter username and password.";
        return;
      }

      const endpoint = isLogin ? "/api/login" : "/api/register";

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });

        if (!res.ok) {
          const text = await res.text();
          message.textContent = text.trim();
          return;
        }

        if (isLogin) {
          window.location.href = "/";
        } else {
          message.textContent = "Account created! You can log in now.";
          message.className = "message success";
          isLogin = true;
          title.textContent = "Login";
          submitBtn.textContent = "Login";
          toggleText.textContent = "Don't have an account?";
          toggleLink.textContent = "Sign up";
        }
      } catch (err) {
        message.textContent = "Connection error.";
      }
    });

    passwordInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") submitBtn.click();
    });

    usernameInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") passwordInput.focus();
    });
  </script>
</body>
</html>
