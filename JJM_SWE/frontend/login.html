<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Graph - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 32px;
      width: 360px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: white;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #2d6cdf;
      border: none;
      margin-top: 16px;
    }

    button:hover {
      opacity: 0.92;
    }

    .toggle {
      text-align: center;
      margin-top: 16px;
      color: #aaa;
      font-size: 14px;
    }

    .toggle a {
      color: #5b9cf5;
      cursor: pointer;
      text-decoration: underline;
    }

    .message {
      font-size: 14px;
      color: #ef9a9a;
      min-height: 20px;
      margin-top: 4px;
    }

    .success {
      color: #a5d6a7;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1 id="form-title">Login</h1>
    <input id="username" type="text" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button id="submit-btn">Login</button>
    <div id="message" class="message"></div>
    <div class="toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link">Sign up</a>
    </div>
  </div>

  <script>
    // login and register form handler
    let isLogin = true;
    const title = document.getElementById("form-title");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submit-btn");
    const message = document.getElementById("message");
    const toggleText = document.getElementById("toggle-text");
    const toggleLink = document.getElementById("toggle-link");

    toggleLink.addEventListener("click", () => {
      isLogin = !isLogin;
      title.textContent = isLogin ? "Login" : "Sign Up";
      submitBtn.textContent = isLogin ? "Login" : "Create Account";
      toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      toggleLink.textContent = isLogin ? "Sign up" : "Log in";
      message.textContent = "";
    });

    submitBtn.addEventListener("click", async () => {
      message.textContent = "";
      message.className = "message";

      const user = usernameInput.value.trim();
      const pass = passwordInput.value;

      if (!user || !pass) {
        message.textContent = "Enter username and password.";
        return;
      }

      const endpoint = isLogin ? "/api/login" : "/api/register";

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });

        if (!res.ok) {
          const text = await res.text();
          message.textContent = text.trim();
          return;
        }

        if (isLogin) {
          window.location.href = "/";
        } else {
          message.textContent = "Account created! You can log in now.";
          message.className = "message success";
          isLogin = true;
          title.textContent = "Login";
          submitBtn.textContent = "Login";
          toggleText.textContent = "Don't have an account?";
          toggleLink.textContent = "Sign up";
        }
      } catch (err) {
        message.textContent = "Connection error.";
      }
    });

    passwordInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") submitBtn.click();
    });

    usernameInput.addEventListener("keyup", (e) => {
      if (e.key === "Enter") passwordInput.focus();
    });
  </script>
</body>
</html>
